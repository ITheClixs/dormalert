name: DormAlert Detect

on:
  # Native schedule: GitHub runs this on a best-effort cron (often a few minutes
  # late under load). Unlimited free minutes on a PUBLIC repo.
  schedule:
    - cron: "*/5 * * * *"
  # Manual run + the trigger your cron-job.org PAT calls for punctual timing.
  workflow_dispatch:
    inputs:
      site:
        description: Site to check
        required: false
        default: livingscience
        type: choice
        options:
          - livingscience
          - studentvillage

concurrency:
  group: dormalert-detect-${{ github.event.inputs.site || 'livingscience' }}
  cancel-in-progress: false

jobs:
  detect:
    name: Run one DormAlert detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SITE: ${{ github.event.inputs.site || 'livingscience' }}

      DORMALERT_DETECTOR_ONLY: "true"
      DORMALERT_ENABLE_CONSOLE_NOTIFIER: "true"
      DORMALERT_DATABASE_PATH: ./artifacts/dormalert.db
      DORMALERT_ARTIFACTS_DIR: ./artifacts
      DORMALERT_LOG_DIR: ./logs
      DORMALERT_LOG_LEVEL: INFO

      # WhatsApp (CallMeBot) is the alert channel. Email stays off, so the
      # orchestrator treats any successful channel (WhatsApp) as the durable one.
      DORMALERT_EMAIL_ENABLED: "false"
      DORMALERT_WHATSAPP_ENABLED: "true"
      DORMALERT_WHATSAPP_PHONE: ${{ secrets.DORMALERT_WHATSAPP_PHONE }}
      DORMALERT_WHATSAPP_APIKEY: ${{ secrets.DORMALERT_WHATSAPP_APIKEY }}

      LIVINGSCIENCE_ENABLED: "true"
      LIVINGSCIENCE_SUBMISSION_MODE: disabled
      LIVINGSCIENCE_TIMEOUT_SECONDS: "20"
      LIVINGSCIENCE_MAX_RETRIES: "2"

      STUDENTVILLAGE_ENABLED: "false"
      STUDENTVILLAGE_SUBMISSION_MODE: disabled

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Restore the SQLite state from the previous run so the dedupe logic works
      # across runs (otherwise you'd get re-alerted every 5 minutes). The
      # rotating run_id key + restore-keys prefix is the standard pattern for a
      # cache entry that needs to be updated each run.
      - name: Restore detector state
        uses: actions/cache/restore@v4
        with:
          path: artifacts/dormalert.db
          key: dormalert-state-${{ env.SITE }}-${{ github.run_id }}
          restore-keys: |
            dormalert-state-${{ env.SITE }}-

      - name: Run one detection cycle
        run: python -m src.main detect-once --site "$SITE" --detector-only

      - name: Save detector state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: artifacts/dormalert.db
          key: dormalert-state-${{ env.SITE }}-${{ github.run_id }}

      - name: Upload detection evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dormalert-evidence-${{ github.run_id }}
          path: |
            artifacts/
            logs/
          if-no-files-found: ignore
          retention-days: 7
