name: DormAlert Detect

on:
  # Native schedule: GitHub runs this on a best-effort cron (often a few minutes
  # late under load). Unlimited free minutes on a PUBLIC repo.
  schedule:
    - cron: "*/5 * * * *"
  # Manual run + the trigger your cron-job.org PAT calls for punctual timing.
  workflow_dispatch:
    inputs:
      site:
        description: Site to check
        required: false
        default: livingscience
        type: choice
        options:
          - livingscience
          - studentvillage

concurrency:
  group: dormalert-detect-${{ github.event.inputs.site || 'livingscience' }}
  cancel-in-progress: false

# actions: write lets the keepalive step re-enable scheduled workflows that
# GitHub auto-disables after 60 days without repository commits.
permissions:
  contents: read
  actions: write

jobs:
  detect:
    name: Run one DormAlert detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SITE: ${{ github.event.inputs.site || 'livingscience' }}

      DORMALERT_DETECTOR_ONLY: "true"
      DORMALERT_ENABLE_CONSOLE_NOTIFIER: "true"
      DORMALERT_DATABASE_PATH: ./artifacts/dormalert.db
      DORMALERT_ARTIFACTS_DIR: ./artifacts
      DORMALERT_LOG_DIR: ./logs
      DORMALERT_LOG_LEVEL: INFO
      DORMALERT_USER_AGENT: "DormAlert/1.0 (+https://github.com/ITheClixs/dormalert)"

      # Email is THE alert channel and the orchestrator's durable channel: an
      # opening is only marked notified once an email actually goes out.
      # Sends from demirguven00@gmail.com to demirguven178@gmail.com via Gmail
      # SMTP. The sender address + Gmail App Password are repo secrets so the
      # public repo never exposes them.
      DORMALERT_EMAIL_ENABLED: "true"
      DORMALERT_SMTP_HOST: smtp.gmail.com
      DORMALERT_SMTP_PORT: "587"
      DORMALERT_SMTP_STARTTLS: "true"
      DORMALERT_SMTP_USERNAME: ${{ secrets.DORMALERT_EMAIL_FROM }}
      DORMALERT_SMTP_PASSWORD: ${{ secrets.DORMALERT_SMTP_PASSWORD }}
      DORMALERT_EMAIL_FROM: ${{ secrets.DORMALERT_EMAIL_FROM }}
      DORMALERT_EMAIL_TO: demirguven178@gmail.com
      DORMALERT_TELEGRAM_ENABLED: "false"

      # WhatsApp (CallMeBot) is an additive best-effort ping on top of email —
      # email remains the durable channel the orchestrator requires. It turns
      # itself on automatically once the CallMeBot secrets exist, so runs stay
      # green until registration is done. Heartbeats are intentionally not in
      # the WhatsApp allowlist; only "go check the site now" alerts ping the
      # phone.
      DORMALERT_WHATSAPP_ENABLED: ${{ secrets.DORMALERT_WHATSAPP_APIKEY != '' && secrets.DORMALERT_WHATSAPP_PHONE != '' }}
      DORMALERT_WHATSAPP_PHONE: ${{ secrets.DORMALERT_WHATSAPP_PHONE }}
      DORMALERT_WHATSAPP_APIKEY: ${{ secrets.DORMALERT_WHATSAPP_APIKEY }}

      LIVINGSCIENCE_ENABLED: "true"
      LIVINGSCIENCE_SUBMISSION_MODE: disabled
      LIVINGSCIENCE_TIMEOUT_SECONDS: "20"
      LIVINGSCIENCE_MAX_RETRIES: "2"

      STUDENTVILLAGE_ENABLED: "false"
      STUDENTVILLAGE_SUBMISSION_MODE: disabled

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Restore the SQLite state from the previous run so the dedupe logic works
      # across runs (otherwise you'd get re-alerted every 5 minutes). The
      # rotating run_id key + restore-keys prefix is the standard pattern for a
      # cache entry that needs to be updated each run.
      - name: Restore detector state
        uses: actions/cache/restore@v4
        with:
          path: artifacts/dormalert.db
          key: dormalert-state-${{ env.SITE }}-${{ github.run_id }}
          restore-keys: |
            dormalert-state-${{ env.SITE }}-

      - name: Run one detection cycle
        run: python -m src.main detect-once --site "$SITE" --detector-only

      - name: Save detector state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: artifacts/dormalert.db
          key: dormalert-state-${{ env.SITE }}-${{ github.run_id }}

      - name: Upload detection evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dormalert-evidence-${{ github.run_id }}
          path: |
            artifacts/
            logs/
          if-no-files-found: ignore
          retention-days: 7

      # GitHub disables `schedule` triggers on public repos after 60 days
      # without commits. This run is usually dispatched by cron-job.org, which
      # survives that, so use it to re-enable both schedules if they were
      # auto-disabled (no-op while they are still enabled).
      - name: Keep scheduled workflows enabled
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow enable dormalert-detect.yml --repo "$GITHUB_REPOSITORY" || true
          gh workflow enable dormalert-heartbeat.yml --repo "$GITHUB_REPOSITORY" || true
