name: DormAlert Heartbeat

# A daily "I am alive" email. As long as it arrives on schedule, the monitor and
# the email channel both work, so silence on the detect alert genuinely means
# "still closed" rather than "secretly broken". If email delivery fails the run
# exits non-zero, so GitHub emails you about the failed workflow as a backstop.

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: dormalert-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    name: Send DormAlert heartbeat email
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      DORMALERT_DETECTOR_ONLY: "true"
      DORMALERT_ENABLE_CONSOLE_NOTIFIER: "true"
      DORMALERT_DATABASE_PATH: ./artifacts/dormalert.db
      DORMALERT_ARTIFACTS_DIR: ./artifacts
      DORMALERT_LOG_DIR: ./logs
      DORMALERT_LOG_LEVEL: INFO

      DORMALERT_EMAIL_ENABLED: "true"
      DORMALERT_SMTP_HOST: smtp.gmail.com
      DORMALERT_SMTP_PORT: "587"
      DORMALERT_SMTP_STARTTLS: "true"
      DORMALERT_SMTP_USERNAME: ${{ secrets.DORMALERT_EMAIL_FROM }}
      DORMALERT_SMTP_PASSWORD: ${{ secrets.DORMALERT_SMTP_PASSWORD }}
      DORMALERT_EMAIL_FROM: ${{ secrets.DORMALERT_EMAIL_FROM }}
      DORMALERT_EMAIL_TO: demirguven178@gmail.com
      DORMALERT_TELEGRAM_ENABLED: "false"

      # Same auto-enable as the detect workflow. The daily heartbeat also goes
      # to WhatsApp so a silently broken CallMeBot relay is noticed within a
      # day instead of on opening day.
      DORMALERT_WHATSAPP_ENABLED: ${{ secrets.DORMALERT_WHATSAPP_APIKEY != '' && secrets.DORMALERT_WHATSAPP_PHONE != '' }}
      DORMALERT_WHATSAPP_PHONE: ${{ secrets.DORMALERT_WHATSAPP_PHONE }}
      DORMALERT_WHATSAPP_APIKEY: ${{ secrets.DORMALERT_WHATSAPP_APIKEY }}

      LIVINGSCIENCE_ENABLED: "true"
      STUDENTVILLAGE_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Read-only restore so the heartbeat can report the last observed state.
      - name: Restore detector state
        uses: actions/cache/restore@v4
        with:
          path: artifacts/dormalert.db
          key: dormalert-state-livingscience-${{ github.run_id }}
          restore-keys: |
            dormalert-state-livingscience-

      - name: Send heartbeat email
        run: python -m src.main send-heartbeat
