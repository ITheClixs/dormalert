name: DormAlert Health Check

# Daily SILENT health check: sends NO email while everything works. It emails
# (and fails the run, so GitHub notifies too) only when the monitor looks
# broken — detector failing repeatedly, or no successful detection recorded
# within the last DORMALERT_HEALTH_MAX_AGE_MINUTES. This replaced the daily
# heartbeat email at the operator's request: the only routine email left is a
# real waitlist-opening alert.
#
# Manual runs can still send a classic "I am alive" heartbeat email via the
# mode input.

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: health = email only on problems; heartbeat = always email
        required: false
        default: health
        type: choice
        options:
          - health
          - heartbeat

concurrency:
  group: dormalert-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    name: Run DormAlert health check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      DORMALERT_DETECTOR_ONLY: "true"
      DORMALERT_ENABLE_CONSOLE_NOTIFIER: "true"
      DORMALERT_DATABASE_PATH: ./artifacts/dormalert.db
      DORMALERT_ARTIFACTS_DIR: ./artifacts
      DORMALERT_LOG_DIR: ./logs
      DORMALERT_LOG_LEVEL: INFO
      # Detect runs every ~5 minutes; anything older than an hour means the
      # detect pipeline (cron-job.org dispatch + GitHub schedule) has stopped.
      DORMALERT_HEALTH_MAX_AGE_MINUTES: "60"

      DORMALERT_EMAIL_ENABLED: "true"
      DORMALERT_SMTP_HOST: smtp.gmail.com
      DORMALERT_SMTP_PORT: "587"
      DORMALERT_SMTP_STARTTLS: "true"
      DORMALERT_SMTP_USERNAME: ${{ secrets.DORMALERT_EMAIL_FROM }}
      DORMALERT_SMTP_PASSWORD: ${{ secrets.DORMALERT_SMTP_PASSWORD }}
      DORMALERT_EMAIL_FROM: ${{ secrets.DORMALERT_EMAIL_FROM }}
      DORMALERT_EMAIL_TO: demirguven178@gmail.com
      DORMALERT_TELEGRAM_ENABLED: "false"

      # Same auto-enable as the detect workflow: WhatsApp Cloud API joins in
      # once its secrets exist. Health alerts would then ping the phone too.
      DORMALERT_WA_CLOUD_ENABLED: ${{ secrets.DORMALERT_WA_CLOUD_TOKEN != '' && secrets.DORMALERT_WA_CLOUD_PHONE_NUMBER_ID != '' && secrets.DORMALERT_WA_CLOUD_TO != '' }}
      DORMALERT_WA_CLOUD_TOKEN: ${{ secrets.DORMALERT_WA_CLOUD_TOKEN }}
      DORMALERT_WA_CLOUD_PHONE_NUMBER_ID: ${{ secrets.DORMALERT_WA_CLOUD_PHONE_NUMBER_ID }}
      DORMALERT_WA_CLOUD_TO: ${{ secrets.DORMALERT_WA_CLOUD_TO }}

      LIVINGSCIENCE_ENABLED: "true"
      STUDENTVILLAGE_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Read-only restore so the health check sees the latest detector state.
      - name: Restore detector state
        uses: actions/cache/restore@v4
        with:
          path: artifacts/dormalert.db
          key: dormalert-state-livingscience-${{ github.run_id }}
          restore-keys: |
            dormalert-state-livingscience-

      - name: Run health check
        run: |
          if [ "${{ github.event.inputs.mode }}" = "heartbeat" ]; then
            python -m src.main send-heartbeat
          else
            python -m src.main check-health
          fi
